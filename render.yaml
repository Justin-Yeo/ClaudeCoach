services:
  - type: web
    name: claudecoach
    runtime: python
    plan: free
    region: singapore # closest to your Supabase region; pick another if you set up Supabase elsewhere
    branch: main
    buildCommand: |
      pip install uv
      uv sync --frozen
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Database
      - key: DATABASE_URL
        sync: false
      # Strava
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_WEBHOOK_VERIFY_TOKEN
        sync: false
      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Anthropic / Claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_MAX_OUTPUT_TOKENS
        value: "3500"
      - key: CLAUDE_MAX_RETRIES
        value: "5"
      # Admin bootstrap
      - key: BOOTSTRAP_ADMIN_TELEGRAM_USER_ID
        sync: false
      # Deployment
      - key: APP_BASE_URL
        sync: false # set after first deploy to https://<service>.onrender.com
      - key: LOG_LEVEL
        value: INFO
